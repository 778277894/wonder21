name: wonderful2
description: تطبيق روائع اليمن
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2
  dio: ^5.9.0
  url_launcher: ^6.3.2

  # Auth & storage
  local_auth: ^2.3.0
  shared_preferences: ^2.2.2

  # Images
  image_picker: ^1.0.7
  cached_network_image: ^3.4.1

  # State management
  provider: ^6.1.2

  # Files / DB
  path_provider: ^2.1.3
  sqflite: ^2.3.3+1
  file_picker: ^8.0.3
  excel: ^4.0.6
  open_filex: ^4.3.4
  permission_handler: ^11.3.1
  

  # UI / Fonts / WebView
  google_fonts: ^6.3.2
  webview_flutter: ^4.9.0

  # Intl & PDF
  intl: ^0.20.2
  pdf: ^3.10.7
  printing: ^5.12.0
  share_plus: ^10.0.0
  

  # (اختياري) أي حزم إضافية تحتاجها… احذف غير المستخدم
  # image_network: ^2.6.0
  # app_image: ^1.0.12
  # flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/ads/ad1.jpg
    - assets/ads/ad2.jpg
    - assets/ads/ad3.jpg
    - assets/icon.png
    - assets/fonts/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
  

# إن كنت ستستخدم flutter_launcher_icons فعّل هذا القسم ثم نفّذ:
# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png